apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storefront
  template:
    metadata:
      labels:
        app: storefront
    spec:
      hostNetwork: true
      hostPID: true
      volumes:
        - name: host-root
          hostPath:
            path: /
      containers:
        - name: web
          image: nginx:latest
          env:
            - name: DB_PASSWORD
              value: "sup3rs3cr3t-prod-password"
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            capabilities:
              add: ["SYS_ADMIN", "NET_ADMIN"]
          volumeMounts:
            - name: host-root
              mountPath: /host
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: prod
spec:
  type: LoadBalancer
  selector:
    app: storefront
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storefront
  namespace: prod
spec:
  rules:
    - host: storefront.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 80
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: storefront-admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
