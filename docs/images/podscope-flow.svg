<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3a4760"/>
    </marker>
  </defs>

  <rect width="1200" height="420" rx="20" fill="#090c14"/>
  <circle cx="600" cy="40" r="280" fill="#818cf8" fill-opacity="0.06"/>
  <text x="48" y="58" fill="#e7edf6" font-size="22" font-weight="800">How Podscope reviews a manifest</text>
  <text x="48" y="82" fill="#8a97ad" font-size="13">Deterministic pipeline first; the AI layer is optional and never required.</text>

  <!-- Step 1 -->
  <rect x="48" y="120" width="200" height="150" rx="14" fill="#0f1420" stroke="#1c2638"/>
  <rect x="72" y="144" width="40" height="40" rx="11" fill="#141b2a" stroke="#283449"/>
  <text x="92" y="170" fill="#22d3ee" font-size="18" font-weight="800" text-anchor="middle">1</text>
  <text x="72" y="214" fill="#e7edf6" font-size="15" font-weight="700">Input</text>
  <text x="72" y="236" fill="#8a97ad" font-size="12">Paste, drop, or upload</text>
  <text x="72" y="253" fill="#8a97ad" font-size="12">multi-document YAML.</text>

  <!-- Step 2 -->
  <rect x="298" y="120" width="200" height="150" rx="14" fill="#0f1420" stroke="#1c2638"/>
  <rect x="322" y="144" width="40" height="40" rx="11" fill="#141b2a" stroke="#283449"/>
  <text x="342" y="170" fill="#22d3ee" font-size="18" font-weight="800" text-anchor="middle">2</text>
  <text x="322" y="214" fill="#e7edf6" font-size="15" font-weight="700">Parse</text>
  <text x="322" y="236" fill="#8a97ad" font-size="12">Safe YAML load into</text>
  <text x="322" y="253" fill="#8a97ad" font-size="12">typed resource models.</text>

  <!-- Step 3 -->
  <rect x="548" y="120" width="200" height="150" rx="14" fill="#0f1420" stroke="#1c2638"/>
  <rect x="572" y="144" width="40" height="40" rx="11" fill="#141b2a" stroke="#283449"/>
  <text x="592" y="170" fill="#22d3ee" font-size="18" font-weight="800" text-anchor="middle">3</text>
  <text x="572" y="214" fill="#e7edf6" font-size="15" font-weight="700">Rule engine</text>
  <text x="572" y="236" fill="#8a97ad" font-size="12">43 checks across six</text>
  <text x="572" y="253" fill="#8a97ad" font-size="12">categories.</text>

  <!-- Step 4 -->
  <rect x="798" y="120" width="200" height="150" rx="14" fill="#0f1420" stroke="#1c2638"/>
  <rect x="822" y="144" width="40" height="40" rx="11" fill="#141b2a" stroke="#283449"/>
  <text x="842" y="170" fill="#22d3ee" font-size="18" font-weight="800" text-anchor="middle">4</text>
  <text x="822" y="214" fill="#e7edf6" font-size="15" font-weight="700">Score</text>
  <text x="822" y="236" fill="#8a97ad" font-size="12">Severity-weighted score,</text>
  <text x="822" y="253" fill="#8a97ad" font-size="12">grade, and status.</text>

  <!-- Step 5 -->
  <rect x="1048" y="120" width="104" height="150" rx="14" fill="#0f1420" stroke="#1c2638"/>
  <rect x="1072" y="144" width="40" height="40" rx="11" fill="url(#brand)"/>
  <text x="1092" y="170" fill="#08111c" font-size="18" font-weight="800" text-anchor="middle">5</text>
  <text x="1072" y="214" fill="#e7edf6" font-size="15" font-weight="700">Report</text>
  <text x="1072" y="236" fill="#8a97ad" font-size="12">Findings</text>
  <text x="1072" y="253" fill="#8a97ad" font-size="12">+ fixes</text>

  <line x1="252" y1="195" x2="294" y2="195" stroke="#3a4760" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="502" y1="195" x2="544" y2="195" stroke="#3a4760" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="752" y1="195" x2="794" y2="195" stroke="#3a4760" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1002" y1="195" x2="1044" y2="195" stroke="#3a4760" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Category strip -->
  <g font-size="11.5" font-weight="600">
    <rect x="48" y="312" width="168" height="34" rx="9" fill="#141b2a" stroke="#26324a"/>
    <circle cx="68" cy="329" r="4" fill="#f43f5e"/>
    <text x="80" y="333" fill="#cdd7e6">Workload Security</text>

    <rect x="228" y="312" width="120" height="34" rx="9" fill="#141b2a" stroke="#26324a"/>
    <circle cx="248" cy="329" r="4" fill="#fb923c"/>
    <text x="260" y="333" fill="#cdd7e6">RBAC</text>

    <rect x="360" y="312" width="180" height="34" rx="9" fill="#141b2a" stroke="#26324a"/>
    <circle cx="380" cy="329" r="4" fill="#facc15"/>
    <text x="392" y="333" fill="#cdd7e6">Network Exposure</text>

    <rect x="552" y="312" width="120" height="34" rx="9" fill="#141b2a" stroke="#26324a"/>
    <circle cx="572" cy="329" r="4" fill="#38bdf8"/>
    <text x="584" y="333" fill="#cdd7e6">Secrets</text>

    <rect x="684" y="312" width="130" height="34" rx="9" fill="#141b2a" stroke="#26324a"/>
    <circle cx="704" cy="329" r="4" fill="#34d399"/>
    <text x="716" y="333" fill="#cdd7e6">Reliability</text>

    <rect x="826" y="312" width="120" height="34" rx="9" fill="#141b2a" stroke="#26324a"/>
    <circle cx="846" cy="329" r="4" fill="#818cf8"/>
    <text x="858" y="333" fill="#cdd7e6">Hygiene</text>

    <rect x="958" y="312" width="194" height="34" rx="9" fill="#141b2a" stroke="#283449" stroke-dasharray="4 3"/>
    <circle cx="978" cy="329" r="4" fill="#22d3ee"/>
    <text x="990" y="333" fill="#8a97ad">Optional AI summary</text>
  </g>

  <text x="48" y="384" fill="#5d6a80" font-size="12">Stable JSON contract out → standalone use today, OpsDeck ingestion tomorrow.</text>
</svg>
