apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-api
  namespace: edge
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: "*"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: public-api
                port:
                  number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: public-api
  namespace: edge
spec:
  type: NodePort
  selector:
    app: public-api
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 31080
